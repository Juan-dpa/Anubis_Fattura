# Custom HTTP responses para GetSWSGO (SMS exfiltration)
#
# ANTES DE USAR: ejecuta compute_cmd.py para obtener el valor cifrado
# de GetSWSGO y reemplaza el valor en Anubis_Commands_SWS.
#
# FLUJO REAL CON GetSWSGO (verificado via PCAP):
#   1. malware ping -> GET/POST /o1o/a16.php
#      FakeNet responde con la URL del C2 entre tags
#   2. malware poll -> POST /o1o/a4.php
#      FakeNet responde con el comando GetSWSGO cifrado entre tags
#      oyqwzkyy.b.a() extrae el contenido entre <tag>...</tag>
#      b.d() descifra -> "9999::GetSWSGO::"
#   3. malware lee SMS inbox/sent/drafts
#      POST /o1o/a11.php con "p=<SMS_cifrado>"   <-- a11, NO a6
#      FakeNet vuelca en http_*.txt (DumpHTTPPosts:Yes en ini principal)
#
# NOTA: b(context,"4",...) -> a6.php  (SMS individual / getapps)
#       b(context,"11",...) -> a11.php (GetSWSGO: bulk SMS dump)
#
# PARA DESCIFRAR LOS SMS CAPTURADOS:
#   python compute_cmd.py --decrypt <valor_del_parametro_p>

[Anubis_Checkin]
InstanceName: HTTPListener80
HttpURIs: /o1o/a16.php
# Devolvemos la URL del C2 por si jtfxlnc.onHandleIntent() la usa para set "url"
HttpStaticString: <tag>http://cdnjs.su</tag>

[Anubis_Commands_SWS]
InstanceName: HTTPListener80
HttpURIs: /o1o/a3.php, /o1o/a4.php
# REEMPLAZAR: ejecuta "python compute_cmd.py" y copia la linea "ini" de GetSWSGO
HttpStaticString: <tag>YmZmMDlhMmRjOGViZjRjNDEzYjU5YTNhMTFiYzY0OTE3NDk3MjJjN2NkN2JiYzEzODA5OTg2YjU1ZTVkM2VlYmNiNDc1ZDljNjM2MzM4YmQ3MzZlNmVlMWZmZTRhYmQxMWE4Nw==</tag>

[Anubis_SMS_Exfil]
InstanceName: HTTPListener80
HttpURIs: /o1o/a6.php
HttpStaticString: <tag>OK</tag>

[Anubis_CatchAll_SWS]
InstanceName: HTTPListener80
HttpURIs: /o1o/
HttpStaticString: <tag>OK</tag>
